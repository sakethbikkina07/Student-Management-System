<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Student Management System</h2>
        <h1>Student Records</h1>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <a href="/"><button>Add Student</button></a>
            <a href="/logout"><button style="background:#dc3545;">Logout</button></a>
        </div>

        {% if students %}
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>
                    <a href="/edit/{{ student[0] }}" style="margin-right: 5px;">
                        <button class="action-btn edit-btn">Edit</button>
                    </a>
                    <a href="/delete/{{ student[0] }}" onclick="return confirm('Are you sure you want to delete this student?');">
                        <button class="action-btn delete-btn">Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p class="center-text">No students added yet. <a href="/">Add one now</a></p>
        {% endif %}
    </div>
</body>
</html>
